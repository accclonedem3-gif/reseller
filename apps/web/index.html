<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nền tảng Reseller Bot</title>
    <meta name="description" content="Nền tảng quản lý shop, bot Telegram bán tài khoản, đơn hàng và kho hàng — tất cả trong một nơi." />

    <!-- Open Graph: link preview khi share lên Telegram / Zalo / Facebook / Messenger -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nền tảng Reseller Bot" />
    <meta property="og:title" content="Nền tảng Reseller Bot" />
    <meta property="og:description" content="Quản lý shop, bot Telegram, đơn hàng và kho — tất cả trong một nơi." />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nền tảng Reseller Bot" />
    <meta name="twitter:description" content="Quản lý shop, bot Telegram, đơn hàng và kho — tất cả trong một nơi." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Màu thanh trình duyệt (mobile) + PWA -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1d2e" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
