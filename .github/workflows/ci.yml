name: CI

# Runs on every push to master and on pull requests targeting master.
# Catches type errors and build breaks before they reach the server (which is deployed manually
# via deploy.ps1). No DB/secrets needed — prisma generate + tsc + vite build are compile-only.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer push to the same branch cancels the in-progress run (saves CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false # don't cancel an in-progress deploy

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck (shared + api + worker + web)
        run: npm run typecheck

      - name: Build (all workspaces)
        run: npm run build

  # CD: deploy to the server only after CI passes, and only on a push to master (not PRs).
  # Requires repo secrets: DEPLOY_SSH_KEY (private key), DEPLOY_HOST, DEPLOY_USER.
  deploy:
    name: Deploy to server
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Write the tarball OUTSIDE the repo dir, otherwise creating it inside '.'
          # changes the directory mid-read and tar aborts with "file changed as we read it" (exit 1).
          TARBALL="${RUNNER_TEMP:-/tmp}/reseller-deploy.tar.gz"
          tar -czf "$TARBALL" \
            --exclude='./.git' --exclude='./node_modules' \
            --exclude='./.env' --exclude='./.env.local' --exclude='./.env.bot-test' --exclude='./.env.bot-test.local' \
            --exclude='./apps/web/dist' --exclude='./apps/api/dist' --exclude='./apps/worker/dist' --exclude='./packages/shared/dist' \
            --exclude='./.turbo' --exclude='./.tmp*' --exclude='*.log' \
            . || { rc=$?; [ "$rc" -eq 1 ] && echo "tar: benign warnings, continuing" || exit "$rc"; }
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$TARBALL" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/reseller-deploy.tar.gz"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" 'cd /opt/reseller-platform && tar -xzf /tmp/reseller-deploy.tar.gz && bash scripts/deploy-remote.sh && rm -f /tmp/reseller-deploy.tar.gz'
