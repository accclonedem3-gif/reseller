name: CI

# Runs on every push to master and on pull requests targeting master.
# Catches type errors and build breaks before they reach the server (which is deployed manually
# via deploy.ps1). No DB/secrets needed — prisma generate + tsc + vite build are compile-only.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer push to the same branch cancels the in-progress run (saves CI minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck (shared + api + worker + web)
        run: npm run typecheck

      - name: Build (all workspaces)
        run: npm run build
